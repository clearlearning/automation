<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey Link Generator</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2rem);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --shadow-md: 0 10px 30px rgba(0,0,0,.08);
      --color-bg: #f7f6f2;
      --color-surface: #fbfbf9;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-muted: #6f6d67;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-soft: #dcebea;
      --color-success: #2e6b3b;
      --color-success-soft: #deeddc;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Satoshi', Arial, sans-serif;
      font-size: var(--text-base);
      color: var(--color-text);
      background: linear-gradient(180deg, #f7f6f2 0%, #efede7 100%);
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: var(--space-8) var(--space-4); }
    .hero { margin-bottom: var(--space-8); }
    h1 { margin: 0 0 var(--space-3); font-size: var(--text-xl); line-height: 1.1; }
    .hero p { margin: 0; color: var(--color-muted); max-width: 68ch; }
    .grid { display: grid; grid-template-columns: 1.08fr 1fr; gap: var(--space-6); align-items: start; }
    .card {
      background: rgba(251,251,249,.9);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(6px);
    }
    .card h2 { margin: 0 0 var(--space-4); font-size: var(--text-lg); }
    .field { display: grid; gap: 0.4rem; margin-bottom: var(--space-4); }
    label { font-size: var(--text-sm); font-weight: 700; }
    input, select {
      width: 100%;
      padding: 0.8rem 0.9rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: white;
      font: inherit;
    }
    input:focus, select:focus {
      outline: 2px solid color-mix(in srgb, var(--color-primary) 45%, white);
      outline-offset: 1px;
      border-color: var(--color-primary);
    }
    .hint { color: var(--color-muted); font-size: var(--text-sm); }
    .actions { display: flex; flex-wrap: wrap; gap: var(--space-3); margin-top: var(--space-4); }
    button {
      border: 0;
      border-radius: 999px;
      padding: 0.8rem 1.1rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-secondary { background: var(--color-primary-soft); color: var(--color-primary-hover); }
    .link-box {
      border: 1px solid var(--color-border);
      background: white;
      border-radius: var(--radius-md);
      padding: 1rem;
      min-height: 180px;
      word-break: break-word;
      line-height: 1.55;
    }
    .status {
      margin-top: var(--space-4);
      padding: 0.85rem 1rem;
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      display: none;
    }
    .status.show { display: block; }
    .status.success {
      background: var(--color-success-soft);
      color: var(--color-success);
      border: 1px solid color-mix(in srgb, var(--color-success) 25%, white);
    }
    .meta { margin-top: var(--space-4); color: var(--color-muted); font-size: var(--text-sm); }
    code { background: #f0efea; padding: 0.1rem 0.35rem; border-radius: 0.35rem; }
    @media (max-width: 840px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>SurveyMonkey Link Generator</h1>
      <p>All fields except Cohort use type-ahead suggestion lists. Users can pick an existing value or type a new one, and blank fields are removed from the final link.</p>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Variables</h2>
        <div id="fields"></div>
        <div class="actions">
          <button class="btn-primary" id="copyBtn" type="button">Copy link</button>
          <button class="btn-secondary" id="clearBtn" type="button">Clear all</button>
        </div>
        <p class="meta">Base link: <code>https://www.surveymonkey.com/r/PWGNPFP</code></p>
      </div>

      <div class="card">
        <h2>Generated link</h2>
        <div id="output" class="link-box" aria-live="polite"></div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
  const baseUrl = 'https://www.surveymonkey.com/r/PWGNPFP';

  const variables = [
    {
      key: 'course',
      label: 'Course Code',
      type: 'datalist',
      suggestions: ['NCITB', 'NCITS', 'NCITAIT', 'NCITW', 'IRG', 'ACRG', 'BCT', 'SYTYWTBABCM', 'ELPR', 'REG101', 'SRASAB']
    },
    {
      key: 'version',
      label: 'Version',
      type: 'datalist',
      suggestions: ['US', 'CAN']
    },
    {
      key: 'method',
      label: 'Method',
      type: 'datalist',
      suggestions: ['V-ILT', 'IPT-ILT', 'Async']
    },
    {
      key: 'module_name',
      label: 'Module name',
      type: 'datalist',
      suggestions: ['M01', 'M02', 'M03', 'M04', 'M05', 'M06', 'M07', 'M08', 'M09', 'M10']
    },
    {
      key: 'Instructor',
      label: 'Instructor',
      type: 'datalist',
      suggestions: ['Anderegg, Karen', 'Barton, Andrew', 'Betteridge, Lise', 'Chambers, Sarah', 'Cooley, Mandi', 'Crumley, John', 'Curley, Stephen', 'deFoy, Carmen', 'Deforest, Denise', 'DeLuca, Ryan', 'DeSousa, Lisa', 'Eichrodt, Sean', 'Erikson, Marcus', 'Jenkins, Robin', 'Kay, David', 'Keirstead, Graeme', 'Pfiefer, Judy', 'Robinson, Jan', 'Salvatori, Michael', 'Stansfield, Katherine', 'Thibert, Lena', 'Thompson, David (Eric)', 'Thompson-May, Brett', 'Verge, Vicki', 'Wade, Amigo', 'Wilkie, Kathy', 'Williams, Deanna']
    },
    {
      key: 'Cohort',
      label: 'Cohort',
      type: 'text'
    }
  ];

  const fieldsEl = document.getElementById('fields');
  const outputEl = document.getElementById('output');
  const statusEl = document.getElementById('status');

  function createDatalistField(config) {
    const field = document.createElement('div');
    field.className = 'field';

    const label = document.createElement('label');
    label.htmlFor = config.key;
    label.textContent = config.label;

    const input = document.createElement('input');
    input.type = 'text';
    input.id = config.key;
    input.name = config.key;
    input.setAttribute('list', `${config.key}_list`);
    input.placeholder = `Type or choose ${config.label.toLowerCase()}`;
    input.addEventListener('input', updateLink);

    const datalist = document.createElement('datalist');
    datalist.id = `${config.key}_list`;
    config.suggestions.forEach(value => {
      const option = document.createElement('option');
      option.value = value;
      datalist.appendChild(option);
    });

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.textContent = 'You can choose a suggestion or type a new value.';

    field.append(label, input, datalist, hint);
    return field;
  }

  function createTextField(config) {
    const field = document.createElement('div');
    field.className = 'field';

    const label = document.createElement('label');
    label.htmlFor = config.key;
    label.textContent = config.label;

    const input = document.createElement('input');
    input.type = 'text';
    input.id = config.key;
    input.name = config.key;
    input.placeholder = `Enter cohort code without spaces`;
    input.addEventListener('input', updateLink);

    field.append(label, input);
    return field;
  }

  function buildFields() {
    variables.forEach(config => {
      let field;

      if (config.type === 'datalist') {
        field = createDatalistField(config);
      } else {
        field = createTextField(config);
      }

      fieldsEl.appendChild(field);
    });
  }

  function getFieldValue(key) {
    return document.getElementById(key).value.trim();
  }

  function getLink() {
    const params = new URLSearchParams();

    variables.forEach(({ key }) => {
      const value = getFieldValue(key);
      if (value) params.append(key, value);
    });

    const query = params.toString();
    return query ? `${baseUrl}?${query}` : baseUrl;
  }

  function updateLink() {
    outputEl.textContent = getLink();
    statusEl.className = 'status';
    statusEl.textContent = '';
  }

  async function copyLink() {
    try {
      await navigator.clipboard.writeText(getLink());
      statusEl.textContent = 'Link copied to clipboard.';
      statusEl.className = 'status success show';
    } catch (e) {
      statusEl.textContent = 'Copy failed. You can still copy the link manually.';
      statusEl.className = 'status show';
    }
  }

  function clearAll() {
    variables.forEach(({ key }) => {
      document.getElementById(key).value = '';
    });
    updateLink();
  }

  document.getElementById('copyBtn').addEventListener('click', copyLink);
  document.getElementById('clearBtn').addEventListener('click', clearAll);

  buildFields();
  updateLink();
</script>
</body>
</html>
